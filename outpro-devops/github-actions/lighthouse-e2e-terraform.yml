# frontend/e2e/smoke.spec.ts
# Playwright smoke tests — run against the deployed Vercel URL after every production deploy

import { test, expect } from '@playwright/test';

const BASE = process.env.BASE_URL ?? 'http://localhost:3000';

test.describe('Public site smoke tests', () => {
  test('Home page loads and has correct title', async ({ page }) => {
    await page.goto(BASE);
    await expect(page).toHaveTitle(/Outpro\.India/);
    await expect(page.locator('h1')).toBeVisible();
    // Hero CTA button must be present
    await expect(page.locator('a[href="/contact"]').first()).toBeVisible();
  });

  test('Navigation links resolve correctly', async ({ page }) => {
    await page.goto(BASE);
    const links = ['/about', '/services', '/portfolio', '/testimonials', '/contact'];
    for (const href of links) {
      const res = await page.request.get(`${BASE}${href}`);
      expect(res.status(), `${href} returned ${res.status()}`).toBe(200);
    }
  });

  test('Contact form is present and interactive', async ({ page }) => {
    await page.goto(`${BASE}/contact`);
    await expect(page.locator('form[aria-label="Contact form"]')).toBeVisible();
    await expect(page.locator('input[name="fullName"]')).toBeVisible();
    await expect(page.locator('input[name="businessEmail"]')).toBeVisible();
    await expect(page.locator('textarea[name="message"]')).toBeVisible();
    await expect(page.locator('button[type="submit"]')).toBeEnabled();
  });

  test('Portfolio page loads projects', async ({ page }) => {
    await page.goto(`${BASE}/portfolio`);
    await expect(page.locator('h1')).toContainText(/project|portfolio/i);
    // At least one filter pill must render
    await expect(page.locator('[role="group"] button').first()).toBeVisible();
  });

  test('API health endpoint returns healthy', async ({ request }) => {
    const apiBase = process.env.API_URL ?? 'https://api.outpro.india';
    const res = await request.get(`${apiBase}/api/v1/health`);
    expect(res.status()).toBe(200);
    const body = await res.json();
    expect(body.status).toBe('healthy');
  });

  test('Security headers are present', async ({ page }) => {
    const res = await page.request.get(BASE);
    const headers = res.headers();
    expect(headers['x-frame-options']).toBeTruthy();
    expect(headers['x-content-type-options']).toBe('nosniff');
    expect(headers['strict-transport-security']).toBeTruthy();
  });

  test('Core Web Vitals — no layout shift on navigation', async ({ page }) => {
    await page.goto(BASE);
    // Measure CLS
    const cls = await page.evaluate(() => {
      return new Promise<number>((resolve) => {
        let clsValue = 0;
        const observer = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            if (!(entry as PerformanceEntry & { hadRecentInput?: boolean }).hadRecentInput) {
              clsValue += (entry as PerformanceEntry & { value: number }).value;
            }
          }
        });
        observer.observe({ type: 'layout-shift', buffered: true });
        setTimeout(() => {
          observer.disconnect();
          resolve(clsValue);
        }, 3000);
      });
    });
    expect(cls, `CLS should be < 0.1, got ${cls}`).toBeLessThan(0.1);
  });
});

test.describe('Admin smoke tests', () => {
  test('Login page redirects unauthenticated admin routes', async ({ page }) => {
    await page.goto(`${BASE}/admin/dashboard`);
    await expect(page).toHaveURL(/\/login/);
  });

  test('Login page renders correctly', async ({ page }) => {
    await page.goto(`${BASE}/login`);
    await expect(page.locator('form[aria-label="Admin login form"]')).toBeVisible();
    await expect(page.locator('input#email')).toBeVisible();
    await expect(page.locator('input#password')).toBeVisible();
  });
});


