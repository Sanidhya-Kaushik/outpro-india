# .github/workflows/terraform.yml
# Infrastructure CI/CD — Terraform plan on PR, apply on merge to main

name: Infrastructure — Terraform

on:
  push:
    branches: [main]
    paths:
      - 'devops/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'devops/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION:  1.7.5
  AWS_REGION:  ap-south-1
  TF_WORK_DIR: devops/terraform

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORK_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config="workspace=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="envs/production/terraform.tfvars" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_jwt_secret:                  ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_database_url:                ${{ secrets.TF_VAR_DATABASE_URL }}
          TF_VAR_resend_api_key:              ${{ secrets.TF_VAR_RESEND_API_KEY }}
          TF_VAR_recaptcha_secret_key:        ${{ secrets.TF_VAR_RECAPTCHA_SECRET_KEY }}
          TF_VAR_supabase_service_role_key:   ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_revalidation_secret:         ${{ secrets.TF_VAR_REVALIDATION_SECRET }}
          TF_VAR_cloudflare_zone_id:          ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token:        ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          TF_VAR_vercel_api_token:            ${{ secrets.TF_VAR_VERCEL_API_TOKEN }}
          TF_VAR_vercel_team_id:              ${{ secrets.TF_VAR_VERCEL_TEAM_ID }}
          TF_VAR_slack_webhook_url:           ${{ secrets.SLACK_WEBHOOK_URL }}

      # Post plan output as PR comment
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORK_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_jwt_secret:                  ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_database_url:                ${{ secrets.TF_VAR_DATABASE_URL }}
          TF_VAR_resend_api_key:              ${{ secrets.TF_VAR_RESEND_API_KEY }}
          TF_VAR_recaptcha_secret_key:        ${{ secrets.TF_VAR_RECAPTCHA_SECRET_KEY }}
          TF_VAR_supabase_service_role_key:   ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_revalidation_secret:         ${{ secrets.TF_VAR_REVALIDATION_SECRET }}
          TF_VAR_cloudflare_zone_id:          ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token:        ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          TF_VAR_vercel_api_token:            ${{ secrets.TF_VAR_VERCEL_API_TOKEN }}
          TF_VAR_vercel_team_id:              ${{ secrets.TF_VAR_VERCEL_TEAM_ID }}
          TF_VAR_slack_webhook_url:           ${{ secrets.SLACK_WEBHOOK_URL }}
