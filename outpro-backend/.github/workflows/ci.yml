# .github/workflows/ci.yml
# CI pipeline: Lint → Type-check → Security Audit → Test → Build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Job 1: Lint + Type-check ────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: TypeScript type check
        run: pnpm typecheck

  # ── Job 2: Security audit ───────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for critical CVEs
        # Block merge on critical vulnerabilities
        run: pnpm audit --audit-level=critical

  # ── Job 3: Unit + Integration tests ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      NODE_ENV: test
      JWT_SECRET: test-secret-that-is-at-least-64-characters-long-for-ci-testing-000000
      REVALIDATION_SECRET: test-revalidation-secret-32-chars-ci!!
      RECAPTCHA_SECRET_KEY: test-recaptcha-key
      RECAPTCHA_MIN_SCORE: '0.5'
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      RESEND_API_KEY: test-resend-key
      EMAIL_FROM: test@outpro.india
      EMAIL_ADMIN_NOTIFY: leads@outpro.india
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-key
      ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: error
      LOG_DIR: /tmp/test-logs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 4: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Verify dist output
        run: |
          test -f dist/server.js || (echo "dist/server.js missing" && exit 1)
          echo "Build output verified ✓"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 5: Docker build (main branch only) ────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Set to true when Docker Hub / ECR secrets are configured
          tags: outpro-india-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout security scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: outpro-india-api:${{ github.sha }}
          only-severities: critical
          exit-code: true
        continue-on-error: true  # Don't block on new critical CVEs yet — notify only
